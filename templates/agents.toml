[agents.pandora]
template = "pandora.md"
includes.replace = ["_common.md", "_common-hitl.md"]
appends.replace = []

[agents.pandora.harness]
kind = "pi"
model = "deepseek-v4-pro"
system_prompt_mode = "replace"
tools.replace = ["bash", "read"]
argv.replace = []

[agents.toil]
template = "toil.md"
includes.replace = ["_common.md", "_common-afk.md"]
appends.replace = []

[agents.toil.harness]
kind = "pi"
model = "openai-codex/gpt-5.4"
system_prompt_mode = "append"
tools.replace = ["bash", "read", "grep", "find", "ls", "subagent"]
argv.replace = []

[agents.greed]
template = "greed.md"
